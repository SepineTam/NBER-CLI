[project]
name = "nber-cli"
version = "0.2.0"
description = "A command-line tool to download NBER papers."
readme = "README.md"
requires-python = ">=3.11"
dependencies = [
    "aiohttp",
    "fake_useragent",
    "aiohttp-retry",
    "certifi",
    "mcp>=1.27.1",
]

[project.scripts]
nber-cli = "nber_cli:main"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[dependency-groups]
dev = [
    "pytest>=9.0.3",
    "pytest-asyncio>=1.4.0",
    "pytest-cov>=7.1.0",
    "ruff>=0.12.12",
]
